name: 🚀 Deploy NestJS Clinica Psiquiatrica API to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Copy project files to VPS via SCP
      uses: appleboy/scp-action@v0.1.7
      with:
        host: 20.63.51.70
        username: azureuser
        key: ssh-rsa  generated-by-azure
        source: "."
        target: "/var/www/clinica-psiquiatrica-api"

    - name: Executing remote SSH commands to deploy
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: 20.63.51.70
        username: azureuser
        key: ssh-rsa  generated-by-azure
        script: |
          set -e
          cd /var/www/clinica-psiquiatrica-api
          
          # Crear el archivo .env directamente con tus credenciales limpias
          cat << 'EOF' > .env
          PORT=3000
          DB_HOST=localhost
          DB_PORT=5432
          DB_USER=antoni_user_pg
          DB_PASS=antoni_secure_pass_2026
          DB_NAME=clinica_psic_db
          JWT_SECRET=antoni_jwt_secret_vps_2026
          MONGO_URI=mongodb://antoni_user_mongo:antoni_mongo_pass_2026@localhost:27017/clinica_psic_mongo?authSource=admin
          EOF

          # Instalar dependencias de producción y compilar la solución
          npm install
          npm run build

          # Reinicio controlado en PM2 para evitar caídas de servicio
          pm2 reload clinica-api || pm2 start dist/main.js --name "clinica-api"
          pm2 save
